name: "system-design-cycle"
description: "End-to-end system design with approval gates -- problem framing, candidate architectures, risk assessment, refinement, and documentation"
version: "1.0.0"
author: "System Design Intelligence"
tags: ["design", "system-design", "staged", "approval-gates", "full-cycle"]

# Staged system design cycle with approval gates.
#
# Four stages mapping to the 8-phase methodology:
#
# Stage 1: Problem Framing (Phases 1-2)
#   - systems-architect ANALYZE: build system map
#   - Extract constraints and assumptions
#   → Approval: User validates problem understanding
#
# Stage 2: Candidates & Tradeoffs (Phases 3-4)
#   - Generate 3 candidate architectures in parallel
#   - Evaluate all candidates against 8-dimension tradeoff frame
#   → Approval: User selects direction
#
# Stage 3: Risk Assessment & Refinement (Phases 5-6)
#   - Adversarial review from 5 perspectives
#   - Refine chosen design incorporating risk feedback
#   → Approval: User approves refined design
#
# Stage 4: Documentation (Phases 7-8)
#   - Migration strategy and success metrics
#   - systems-design-writer produces final document
#
# Typical runtime: 15-30 minutes (includes approval wait times)
# Required agents: systems-design:systems-architect,
#                  systems-design:systems-design-critic,
#                  systems-design:systems-design-writer
#
# Usage:
#   Execute recipe with design_problem="description of what to design"
#
# Approval workflow:
#   - Recipe pauses at each approval gate (3 gates total)
#   - Use recipe approvals tool to see pending approvals
#   - Approve to continue, deny to stop and work interactively
#   - Approval message is passed to the next stage as user direction

context:
  design_problem: ""                               # Required: what system or feature to design
  constraints: ""                                  # Optional: known constraints (budget, timeline, team, tech)
  existing_system: ""                              # Optional: path to existing codebase if replacing/extending
  output_path: "docs/designs/system-design.md"     # Optional: where to write the final document
  _approval_message: ""                            # Injected by approval gates at runtime
  archetypes:
    - "simplest-viable"
    - "most-scalable"
    - "most-robust"

stages:
  # ==========================================================================
  # Stage 1: Problem Framing (Phases 1-2)
  # ==========================================================================
  - name: "problem-framing"
    steps:
      - id: "build-system-map"
        agent: "systems-design:systems-architect"
        mode: "ANALYZE"
        timeout: 600
        output: "system_map"
        prompt: |
          Frame this design problem for systematic exploration:

          Problem: {{design_problem}}
          Known constraints: {{constraints}}
          Existing system: {{existing_system}}

          Build a system map:
          1. **Goals**: What must this system accomplish? What does success look like?
          2. **Constraints**: What is fixed? Include both stated constraints and ones
             you can infer from the problem description.
          3. **Actors**: Who and what interacts with this system?
          4. **Interfaces**: Where are the boundaries? What crosses them?
          5. **Failure modes**: What are the most likely and most dangerous failures?
          6. **Time horizons**: What matters now vs. 6 months vs. 3 years?
          7. **Key decisions**: What are the critical architectural choices to make?

          If an existing system path is provided, survey it to ground the analysis
          in reality rather than assumptions.

          Be thorough. This framing drives everything downstream.
          Flag ambiguities and assumptions explicitly.

      - id: "extract-constraints"
        agent: "systems-design:systems-architect"
        mode: "ANALYZE"
        timeout: 600
        output: "constraints_analysis"
        prompt: |
          Based on this system map, extract every constraint and assumption
          -- both explicit and implicit:

          System map: {{system_map}}
          Problem: {{design_problem}}
          Stated constraints: {{constraints}}
          Existing system: {{existing_system}}

          Produce a numbered list grouped into:

          **Hard Constraints** (non-negotiable):
          - Technical constraints (compatibility, platform, language)
          - Organizational constraints (team size, skills, timeline)
          - Business constraints (budget, compliance, SLAs)

          **Assumptions** (believed true but not verified):
          - Scale assumptions (users, data volume, request rate)
          - Dependency assumptions (availability of services, APIs, infrastructure)
          - Behavioral assumptions (usage patterns, growth trajectory)

          **Open Questions** (need answers before design can proceed):
          - Ambiguities in the problem statement
          - Missing information about existing system
          - Decisions that need stakeholder input

          For each assumption, note: "If this is wrong, the impact is [X]."

  # ==========================================================================
  # Stage 2: Candidates & Tradeoffs (Phases 3-4)
  # Approval gate: User validates problem framing before generating designs
  # ==========================================================================
  - name: "candidates"
    approval:
      required: true
      prompt: |
        PROBLEM FRAMING COMPLETE

        System map:
        {{system_map}}

        Constraints and assumptions:
        {{constraints_analysis}}

        Review the problem framing above.
        - Approve to proceed with generating 3 candidate architectures.
        - Deny to stop and refine the problem framing interactively.
        - Include any corrections or priority guidance in your approval message.
    steps:
      - id: "generate-candidates"
        agent: "systems-design:systems-architect"
        mode: "DESIGN"
        timeout: 600
        foreach: "{{archetypes}}"
        as: "archetype"
        parallel: 3
        collect: "candidate_designs"
        prompt: |
          Design a **{{archetype}}** architecture for this problem.

          Problem: {{design_problem}}
          System map: {{system_map}}
          Constraints: {{constraints_analysis}}
          User direction: {{_approval_message}}

          Design archetype guidance:

          For simplest-viable: Minimum design meeting core requirements. Maximize
            simplicity. Fewest components, fewest moving parts, fewest concepts.
            Accept limitations in scalability and resilience if core function works.

          For most-scalable: Optimized for growth in usage, data, and team size.
            Design for 10x-100x current needs. Accept higher initial complexity.
            Focus on horizontal scaling, loose coupling, independent deployability.

          For most-robust: Optimized for reliability, failure tolerance, and
            operational simplicity. Design for graceful degradation, blast radius
            containment, and observability. Accept higher cost for resilience.

          Provide:
          1. Architecture overview (components, boundaries, data flows)
          2. Key technology choices with rationale
          3. What this design optimizes for
          4. What this design sacrifices
          5. When this design would be the right choice
          6. When this design would be the wrong choice
          7. Rough complexity assessment

      - id: "evaluate-tradeoffs"
        agent: "systems-design:systems-architect"
        mode: "ASSESS"
        timeout: 600
        output: "tradeoff_evaluation"
        prompt: |
          Evaluate these 3 candidate architectures against the 8-dimension
          tradeoff frame:

          Problem: {{design_problem}}
          System map: {{system_map}}
          Constraints: {{constraints_analysis}}

          Candidate designs:
          {{candidate_designs}}

          Fill this comparison matrix:

          | Dimension          | simplest-viable | most-scalable | most-robust |
          |--------------------|-----------------|---------------|-------------|
          | Latency            |                 |               |             |
          | Complexity         |                 |               |             |
          | Reliability        |                 |               |             |
          | Cost               |                 |               |             |
          | Security           |                 |               |             |
          | Scalability        |                 |               |             |
          | Reversibility      |                 |               |             |
          | Organizational fit |                 |               |             |

          Then provide:
          1. **Comparison matrix** filled with qualitative ratings and justifications
          2. **Key differentiators**: Where do the designs diverge most?
          3. **Recommendation**: Which design to proceed with and why
          4. **What the recommendation optimizes for** and **what it sacrifices**
          5. **Hybrid opportunities**: Can strengths from different candidates combine?
          6. **What would have to be true for this to be the wrong choice?**

  # ==========================================================================
  # Stage 3: Risk Assessment & Refinement (Phases 5-6)
  # Approval gate: User selects direction before investing in risk analysis
  # ==========================================================================
  - name: "risk-and-refinement"
    approval:
      required: true
      prompt: |
        CANDIDATES & TRADEOFF ANALYSIS COMPLETE

        Candidate designs:
        {{candidate_designs}}

        Tradeoff evaluation:
        {{tradeoff_evaluation}}

        Review the candidates and tradeoff analysis above.
        - Approve to proceed with adversarial risk assessment of the recommendation.
        - Deny to stop and explore alternatives interactively.
        - Include your direction in the approval message (e.g., "go with simplest-viable",
          "combine X from scalable with Y from robust").
    steps:
      - id: "adversarial-review"
        agent: "systems-design:systems-design-critic"
        timeout: 600
        output: "risk_assessment"
        prompt: |
          Adversarial review of the selected design direction.

          Problem: {{design_problem}}
          System map: {{system_map}}
          Constraints: {{constraints_analysis}}
          All candidates: {{candidate_designs}}
          Tradeoff evaluation: {{tradeoff_evaluation}}
          User's chosen direction: {{_approval_message}}

          Stress-test the chosen design from 5 adversarial perspectives:

          1. **SRE**: How does this break at 3 AM? What's the on-call burden?
             Blast radius of component failures? Recovery time estimates?
          2. **Security reviewer**: What's the attack surface? Where are trust
             boundaries weak? What data exposure risks exist?
          3. **Staff engineer**: Is this the right complexity? Will the team
             maintain this in 2 years? Where is the hidden coupling?
          4. **Finance owner**: What are cost drivers at scale? Where are
             runaway spending risks? What's the cost of the simplicity tradeoff?
          5. **Operator**: How do you deploy, monitor, debug, rollback?
             What requires manual intervention? What breaks silently?

          For each perspective:
          - Top risks (severity: critical/high/medium/low)
          - Specific failure scenarios with blast radius
          - Mitigation recommendations

          Unified assessment:
          - Critical risks that MUST be addressed before implementation
          - Significant concerns to track
          - What the design gets right

      - id: "refine-design"
        agent: "systems-design:systems-architect"
        mode: "DESIGN"
        timeout: 600
        output: "refined_design"
        prompt: |
          Refine the chosen architecture incorporating the risk assessment.

          Problem: {{design_problem}}
          System map: {{system_map}}
          Constraints: {{constraints_analysis}}
          User's chosen direction: {{_approval_message}}
          All candidates (for reference): {{candidate_designs}}
          Tradeoff evaluation: {{tradeoff_evaluation}}
          Risk assessment: {{risk_assessment}}

          Produce the refined architecture:

          1. **Architecture overview**: Updated components, boundaries, data flows
             incorporating mitigations for critical and high-severity risks
          2. **Changes from original**: What was modified and why
          3. **Accepted risks**: Risks that remain after mitigation, with rationale
             for why they are acceptable
          4. **Migration strategy**: If replacing an existing system, how to get there
             incrementally. If greenfield, phased rollout plan.
          5. **Success metrics**: How do we know this design is working?
             - Operational metrics (latency, error rate, availability)
             - Business metrics (user adoption, cost per request)
             - Warning signals that indicate the design is failing
          6. **Key implementation decisions**: What the implementer needs to decide
             that the architect should NOT prescribe

  # ==========================================================================
  # Stage 4: Documentation (Phases 7-8)
  # Approval gate: User approves refined design before writing the document
  # ==========================================================================
  - name: "documentation"
    approval:
      required: true
      prompt: |
        RISK ASSESSMENT & REFINEMENT COMPLETE

        Risk assessment:
        {{risk_assessment}}

        Refined design:
        {{refined_design}}

        Review the refined design and risk assessment above.
        - Approve to produce the final design document at {{output_path}}.
        - Deny to stop and refine further interactively.
    steps:
      - id: "write-document"
        agent: "systems-design:systems-design-writer"
        timeout: 600
        output: "design_document"
        prompt: |
          Write the system design document. Save it to: {{output_path}}

          Use ALL of the following as source material:

          - Problem: {{design_problem}}
          - System map: {{system_map}}
          - Constraints and assumptions: {{constraints_analysis}}
          - Candidate designs explored: {{candidate_designs}}
          - Tradeoff evaluation: {{tradeoff_evaluation}}
          - Risk assessment: {{risk_assessment}}
          - Refined design: {{refined_design}}

          Structure the document as:

          # System Design: [System Name]

          ## Executive Summary
          (2-3 paragraphs: what we're building, why, and the key design choices)

          ## Problem Statement
          (Goals, constraints, actors, interfaces -- from system map)

          ## Constraints and Assumptions
          (Hard constraints, assumptions with impact analysis, open questions)

          ## Design
          (The refined architecture: components, boundaries, data flows,
          technology choices with rationale)

          ## Alternatives Considered
          (Summary of all candidates with why they were not chosen --
          preserves the reasoning for future readers)

          ## Tradeoff Analysis
          (The 8-dimension comparison matrix and key differentiators)

          ## Risk Assessment
          (Severity-ranked risks, mitigations applied, accepted risks)

          ## Migration Strategy
          (How to get from here to there, phased rollout, rollback plan)

          ## Success Metrics
          (Operational and business metrics, warning signals)

          ## Open Questions
          (Decisions deferred to implementation, stakeholder input needed)

          Write clearly and concisely. Use tables for structured comparisons.
          Every design choice must trace to a constraint or goal.
          Every risk mitigation must trace to a specific finding.

# Output Summary:
#
# After full execution, you'll have:
# - system_map: Problem framing with goals, constraints, actors, boundaries
# - constraints_analysis: Hard constraints, assumptions, open questions
# - candidate_designs: 3 parallel architectures (simplest, scalable, robust)
# - tradeoff_evaluation: 8-dimension comparison with recommendation
# - risk_assessment: 5-perspective adversarial review
# - refined_design: Final architecture with mitigations, migration, metrics
# - design_document: Complete design doc written to output_path
#
# You can stop at any approval gate and work with intermediate results.
# Approval messages carry user direction into subsequent stages.
